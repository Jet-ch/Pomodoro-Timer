<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Menu Page</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
</head>

<body>
  <h1>Pomodoro Timer</h1>
  <div class="container">
    <h1 id = "HowLongQuestion">How long are you studying today?</h1>

    <div class="duration-grid">
    <button class="duration-btn" data-duration="30">
      <img src="../assets/pompompurin_icon-removebg-preview.png"/>
      <span>30 mins</span>
    </button>
    
    <button class="duration-btn" data-duration="60"> 
      <img src="../assets/__sanrio-removebg-preview.png"/>
      <span>1 hour</span>
    </button>
  
    <button class="duration-btn" data-duration="90">
      <img src="../assets/single_tear-removebg-preview.png"/>
      <span>1.5 hour</span>
    </button>

    <button class="duration-btn" data-duration="120"> 
      <img src="../assets/Crying-removebg-preview.png"/>
      <span>2 hour</span>
    </button>


    <script src="script.js"></script> <!--This is to let html know that take functions at script.js-->
    </div>
  </div>
</body>

</html>
