<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Rest Page</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
</head>

<body>
  <h1>Pomodoro Timer</h1>
  <div class="container">


    <h1 id="message">Doom Scrolling...</h1>
    <img class="rest-icon" src="../assets/lying_down_with_phone-removebg-preview.png" />
    <p id="timer">5:00</p>
    <p id='timerMessage'></p>
    <div class="btn-row">
      <button id="end">Finish</button>
      <button id="skip-btn">Start</button>
    </div>



    <script src="script.js"></script> <!--This is to let html know that take functions at script.js-->
  </div>
</body>

</html>
